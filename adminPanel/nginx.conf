server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /admin/ {
        try_files $uri /index.html;
    }

    error_page 404 /index.html;

    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg|pdf|map)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }
}